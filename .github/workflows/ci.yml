name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, testes e build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar workflows GitHub Actions
        run: node scripts/validate-workflow.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes unitários e integração
        run: npm test

      - name: Build
        run: npm run build

  api-e2e:
    name: API E2E (Neon)
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Testes API
        run: |
          if [ -z "$NEON_API_KEY" ]; then
            echo "NEON_API_KEY não configurada; pulando testes API E2E."
            exit 0
          fi
          npm run test:api-e2e

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    env:
      CI: true
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Testes E2E
        run: |
          if [ -z "$NEON_API_KEY" ]; then
            echo "NEON_API_KEY não configurada; pulando testes E2E."
            exit 0
          fi
          npm run test:e2e
